<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport ──────────────────────────────────────────────── -->
    <!-- viewport-fit=cover is critical — it lets our CSS use        -->
    <!-- env(safe-area-inset-*) to avoid iPhone notch/home bar       -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Basic meta ────────────────────────────────────────────── -->
    <title>Sudoku Flow</title>
    <meta name="description" content="Daily Sudoku puzzles with streaks, goals and beautiful themes." />

    <!-- ── PWA / iOS specific ────────────────────────────────────── -->
    <!-- apple-mobile-web-app-capable makes it feel native on iOS    -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sudoku Flow" />

    <!-- Apple touch icon — shown when user adds to home screen on iOS -->
    <!-- Android uses the manifest icons; iOS uses this tag           -->
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />

    <!-- Favicon for browser tab -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />

    <!-- ── Prevent tap highlight flash on mobile ─────────────────── -->
    <style>
      * { -webkit-tap-highlight-color: transparent; }

      /* Prevent overscroll bounce — makes it feel more native       */
      html, body {
        overscroll-behavior: none;
        overflow: hidden;
        height: 100%;
        margin: 0;
        padding: 0;
        /* Prevent text selection during gameplay                    */
        user-select: none;
        -webkit-user-select: none;
      }

      #root {
        height: 100%;
      }

      /* iOS safe area colour — matches our Midnight theme           */
      body {
        background-color: #0f0f1a;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <!-- Vite replaces this script tag with the compiled bundle -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
