<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <!-- ── Viewport ──────────────────────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- ── Basic meta ────────────────────────────────────────────── -->
    <title>Sudoku Flow</title>
    <meta name="description" content="Daily Sudoku puzzles with streaks, goals and beautiful themes." />
    <!-- ── PWA / iOS specific ────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sudoku Flow" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />
    <!-- ── AdMob ──────────────────────────────────────────────────── -->
    <!-- Only loads inside the TWA (Android app), not in browser     -->
    <script>
      if (window.admob) {
        window.admob.banner.show({
          adUnitId: 'ca-app-pub-9142018592022590/5436738704',
          position: window.admob.banner.position.TOP,
          size: window.admob.banner.size.SMART_BANNER,
        });
      }
    </script>
    <!-- ── Prevent tap highlight flash on mobile ─────────────────── -->
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      html, body {
        overscroll-behavior: none;
        overflow: hidden;
        height: 100%;
        margin: 0;
        padding: 0;
        user-select: none;
        -webkit-user-select: none;
      }
      #root {
        height: 100%;
      }
      body {
        background-color: #0f0f1a;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
